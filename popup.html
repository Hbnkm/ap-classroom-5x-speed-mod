<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin: 0;
    }
    h1 { margin: 0 0 15px 0; font-size: 20px; text-align: center; }
    .buttons { display: flex; gap: 8px; justify-content: center; }
    button {
      padding: 10px 15px;
      background: white;
      color: #667eea;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #f0f0f0; }
  </style>
</head>
<body>
  <h1>⚡ AP Classroom 5x</h1>
  <div class="buttons">
    <button onclick="setSpeed(1)">1x</button>
    <button onclick="setSpeed(2)">2x</button>
    <button onclick="setSpeed(5)">⚡ 5x</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
